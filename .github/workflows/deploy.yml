name: Deploy to DigitalOcean Droplet

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image on GitHub runner
        run: docker build -t kashmir-booking:latest .

      - name: Save Docker image to file
        run: docker save kashmir-booking:latest | gzip > kashmir-booking.tar.gz

      - name: Ensure Docker is installed on Droplet
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          password: ${{ secrets.DROPLET_PASSWORD }}
          script: |
            if ! command -v docker &> /dev/null; then
              echo "Docker not found — installing..."
              apt-get update -y
              apt-get install -y ca-certificates curl gnupg lsb-release
              install -m 0755 -d /etc/apt/keyrings
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
              chmod a+r /etc/apt/keyrings/docker.gpg
              echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" > /etc/apt/sources.list.d/docker.list
              apt-get update -y
              apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
              systemctl enable docker
              systemctl start docker
              echo "Docker installed successfully"
            else
              echo "Docker already installed: $(docker --version)"
            fi
            mkdir -p /opt/kashmir-booking

      - name: Copy image + compose files to Droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          password: ${{ secrets.DROPLET_PASSWORD }}
          source: "kashmir-booking.tar.gz,docker-compose.yml,nginx"
          target: "/opt/kashmir-booking"
          overwrite: true

      - name: Generate .env and Deploy on Droplet
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          password: ${{ secrets.DROPLET_PASSWORD }}
          script: |
            cd /opt/kashmir-booking

            # Auto-generate .env from GitHub Secrets
            cat > .env <<EOF
            NODE_ENV=production
            PORT=5000
            MONGO_URI=${{ secrets.MONGO_URI }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}
            CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}
            CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}
            EOF

            # Remove leading whitespace from heredoc
            sed -i 's/^[[:space:]]*//' .env

            echo ".env generated from GitHub Secrets"

            # Deploy containers
            docker compose down
            docker load < kashmir-booking.tar.gz
            rm kashmir-booking.tar.gz
            docker compose up -d

            # Seed the database (runs inside the container)
            docker exec kashmir-booking node /app/server/seedActivities.js || echo "Seed skipped or already done"

            docker system prune -f
            echo "Deployment complete!"
